name: Auto Tag

on:
  push:
    branches: [master]
    paths: ['version.json']

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: get-version
        run: node -e "const fs=require('fs'); const v=require('./version.json').version; fs.appendFileSync(process.env.GITHUB_OUTPUT, 'tag=v'+v+'\n')"
      - id: check-tag
        run: |
          if git rev-parse "${{ steps.get-version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check-tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.get-version.outputs.tag }}';
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
