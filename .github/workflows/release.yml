name: Release

on:
  push:
    branches: [master]
    paths: ['version.json']

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-version.outputs.tag }}
      created: ${{ steps.check-tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: get-version
        run: node -e "const fs=require('fs'); const v=require('./version.json').version; fs.appendFileSync(process.env.GITHUB_OUTPUT, 'tag=v'+v+'\n')"
      - id: check-tag
        run: |
          if git ls-remote --tags origin "${{ steps.get-version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check-tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.get-version.outputs.tag }}';
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });

  build:
    needs: tag
    if: needs.tag.outputs.created == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.tag.outputs.tag }}
          IS_PRE: ${{ contains(needs.tag.outputs.tag, 'alpha') || contains(needs.tag.outputs.tag, 'beta') || contains(needs.tag.outputs.tag, 'rc') }}
        run: |
          $args = @(
            'release', 'create', $env:TAG_NAME,
            'dist/*.exe', 'dist/*.exe.blockmap',
            '--title', $env:TAG_NAME,
            '--generate-notes'
          )
          if ($env:IS_PRE -eq 'false') { $args += '--latest' }
          if ($env:IS_PRE -eq 'true') { $args += '--prerelease' }
          & 'gh' $args
