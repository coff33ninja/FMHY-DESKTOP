name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          IS_PRE: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        run: |
          $args = @(
            'release', 'create', $env:TAG_NAME,
            'dist/*.exe', 'dist/*.exe.blockmap',
            '--title', $env:TAG_NAME,
            '--generate-notes'
          )
          if ($env:IS_PRE -eq 'false') { $args += '--latest' }
          if ($env:IS_PRE -eq 'true') { $args += '--prerelease' }
          & 'gh' $args
